<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login — Dream Planners Group</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: var(--navy-dark); min-height: 100vh; display: flex; flex-direction: column; }

        .login-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(160deg, var(--navy-dark) 0%, #111850 50%, #1a2472 100%);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .login-wrap::before {
            content: '';
            position: absolute;
            top: -200px; right: -200px;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(184,149,42,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-wrap::after {
            content: '';
            position: absolute;
            bottom: -150px; left: -150px;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        @keyframes loginFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            animation: loginFadeIn 0.5s ease forwards;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: 52px 48px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4);
        }

        .login-logo {
            display: block;
            margin: 0 auto 32px;
            height: 52px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.9;
        }

        .login-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--white);
            text-align: center;
            margin-bottom: 6px;
        }
        .login-subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
            text-align: center;
            margin-bottom: 36px;
            letter-spacing: 0.04em;
        }

        .login-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(184,149,42,0.4), transparent);
            margin-bottom: 32px;
        }

        .login-field {
            margin-bottom: 20px;
        }
        .login-field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        .login-field input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--white);
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }
        .login-field input::placeholder { color: rgba(255,255,255,0.25); }
        .login-field input:focus {
            border-color: rgba(184,149,42,0.6);
            background: rgba(255,255,255,0.09);
        }

        .login-error {
            display: none;
            background: rgba(220,38,38,0.12);
            border: 1px solid rgba(220,38,38,0.3);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #fca5a5;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-error.visible { display: block; }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            padding: 15px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }

        .login-back {
            display: none;
        }
        .login-back-top {
            position: fixed;
            top: 24px;
            left: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: rgba(255,255,255,0.75);
            font-size: 0.88rem;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 9px 18px;
            transition: background 0.2s, color 0.2s;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .login-back-top:hover {
            background: rgba(255,255,255,0.18);
            color: var(--white);
        }

        @media (max-width: 480px) {
            .login-card { padding: 40px 28px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>

<a href="index.html" class="login-back-top">← Back to Main Site</a>

<div class="login-wrap">
    <div class="login-card">
        <img src="logo.png" alt="Dream Planners Group" class="login-logo">
        <h1 class="login-title">Agent Portal</h1>
        <p class="login-subtitle">DREAM PLANNERS GROUP · GREAT EASTERN</p>
        <div class="login-divider"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="login-field">
                <label>Agent ID</label>
                <input type="text" id="agentId" placeholder="Enter your Agent ID" autocomplete="username" required>
            </div>
            <div class="login-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter team password" autocomplete="current-password" required>
            </div>
            <div class="login-error" id="loginError">Invalid Agent ID or password. Please try again.</div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <a href="index.html" class="login-back">← Back to main site</a>
    </div>
</div>

<script>
    // If already logged in, redirect to portal
    _supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'agent-portal.html';
    });

    async function handleLogin(e) {
        e.preventDefault();
        const agentId = document.getElementById('agentId').value.trim();
        const password = document.getElementById('password').value;
        const err = document.getElementById('loginError');
        err.classList.remove('visible');

        const { data, error } = await _supabase.auth.signInWithPassword({
            email: `${agentId}@dpg.internal`,
            password
        });

        if (error) {
            err.classList.add('visible');
            document.getElementById('password').value = '';
            return;
        }

        window.location.href = 'agent-portal.html';
    }
</script>
</body>
</html>
